# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: check-json
      - id: pretty-format-json
        args: [--autofix, --no-sort-keys]
      - id: check-yaml

  - repo: local
    hooks:
      - id: remove-core-file
        name: "🗑️ Remove core file if it exists"
        entry: bash -c '[[ -f core && ! -d core ]] && rm core || exit 0'
        language: system
        stages:
          - pre-commit

  - repo: local
    hooks:
      - id: nixfmt
        name: "❄️ Nixfmt (RFC style)"
        description: >
          🔧 Format Nix files using nixfmt-rfc-style for RFC compliance
        entry: nixfmt
        language: system
        files: \.nix$
        args: []
        types: [nix]

  - repo: local
    hooks:
      - id: yamllint
        name: "🔍 yamllint - YAML linter"
        entry: yamllint
        language: system
        types: [yaml]
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: shellcheck-scripts
        name: "🐚 ShellCheck - scripts"
        entry: shellcheck
        language: system
        files: \.(sh|bash|zsh)$
        pass_filenames: true
